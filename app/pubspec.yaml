name: dolunch
description: "점심어때 — 인플루언서 점심 모임 플랫폼"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  # 상태관리
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 네비게이션
  go_router: ^14.8.1

  # 네트워크
  dio: ^5.8.0+1
  retrofit: ^4.4.2

  # 로컬 저장소
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5

  # 영상
  video_player: ^2.9.5
  camera: ^0.11.1

  # 이미지
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # UI
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  percent_indicator: ^4.2.3
  modal_bottom_sheet: ^3.0.0

  # 날짜/시간
  intl: ^0.20.2

  # 딥링크/URL
  url_launcher: ^6.3.1

  # 앱 정보
  package_info_plus: ^8.3.0

  # 에러 모니터링
  sentry_flutter: ^9.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3
  retrofit_generator: ^9.1.9
  json_serializable: ^6.9.5
  json_annotation: ^4.9.0

  # 앱 아이콘 / 스플래시 생성기
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.4

# 앱 아이콘 (글램 그라데이션 + 포크/나이프)
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/branding/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "assets/branding/icon_bg.png"
  adaptive_icon_foreground: "assets/branding/icon_fg.png"
  remove_alpha_ios: true

# 네이티브 스플래시 (콜드스타트 즉시 표시되는 그라데이션 + 로고)
flutter_native_splash:
  color: "#F0457E"
  background_image: "assets/branding/splash_bg.png"
  image: "assets/branding/splash_logo.png"
  android_12:
    image: "assets/branding/splash_logo.png"
    color: "#F0457E"
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/
    - assets/images/
    - assets/branding/
  fonts:
    - family: Pretendard
      fonts:
        - asset: assets/fonts/Pretendard-Regular.otf
          weight: 400
        - asset: assets/fonts/Pretendard-Medium.otf
          weight: 500
        - asset: assets/fonts/Pretendard-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Pretendard-Bold.otf
          weight: 700
        - asset: assets/fonts/Pretendard-ExtraBold.otf
          weight: 800
